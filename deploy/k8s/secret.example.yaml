apiVersion: v1
kind: Secret
metadata:
  name: lop-app-secrets
  namespace: life-observability-platform
type: Opaque
stringData:
  POSTGRES_DB: lop
  POSTGRES_USER: lop
  POSTGRES_PASSWORD: change-me
  DATABASE_URL: postgresql+psycopg://lop:change-me@lop-postgres:5432/lop
  SECRET_KEY: replace-with-a-long-random-secret
  CORS_ORIGINS: https://lop.example.com
  NEXT_PUBLIC_API_BASE_URL: https://lop.example.com/api/v1
  GITHUB_API_TOKEN: ""
