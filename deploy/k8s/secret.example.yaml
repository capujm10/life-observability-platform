apiVersion: v1
kind: Secret
metadata:
  name: lop-app-secrets
  namespace: life-observability-platform
type: Opaque
stringData:
  POSTGRES_DB: lop
  POSTGRES_USER: lop
  POSTGRES_PASSWORD: change-me
  # Backend database connection string used by FastAPI.
  DATABASE_URL: postgresql+psycopg://lop:change-me@lop-postgres:5432/lop
  # Replace with a long random value before deployment.
  SECRET_KEY: replace-with-a-long-random-secret
  # Public origin allowed to call the backend API.
  CORS_ORIGINS: https://lop.example.com
  # Public API URL consumed by the frontend image at runtime.
  NEXT_PUBLIC_API_BASE_URL: https://lop.example.com/api/v1
  # Optional unless GitHub sync is enabled.
  GITHUB_API_TOKEN: ""
