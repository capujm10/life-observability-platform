apiVersion: v1
kind: Secret
metadata:
  name: lop-secret
  namespace: life-observability-platform
type: Opaque
stringData:
  # Copy this file to a real secret manifest before applying it to the cluster.
  # Postgres uses fixed database and username values in the current manifest.
  POSTGRES_PASSWORD: change-me
  # Backend database connection string used by FastAPI.
  DATABASE_URL: postgresql://postgres:change-me@lop-postgres:5432/personal_os
  # Replace with a long random value before deployment.
  SECRET_KEY: replace-with-a-long-random-secret
  # Public frontend origin allowed to call the backend API.
  CORS_ORIGINS: http://186.177.187.155.nip.io
  # Public API URL consumed by the frontend image at runtime. Keep /api/v1.
  NEXT_PUBLIC_API_BASE_URL: http://186.177.187.155.nip.io/api/v1
  # Optional unless GitHub sync is enabled.
  GITHUB_API_TOKEN: ""
