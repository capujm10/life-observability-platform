apiVersion: apps/v1
kind: Deployment
metadata:
  name: lop-frontend
  namespace: life-observability-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lop-frontend
  template:
    metadata:
      labels:
        app: lop-frontend
    spec:
      # Uncomment this block if the GHCR package is private.
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
      containers:
        - name: frontend
          # Replace this published Git SHA tag when promoting a newer frontend release.
          image: ghcr.io/capujm10/life-observability-platform-frontend:4f055c29907d7cb8a9c833a260d9005390b5ea5d
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: lop-app-secrets
                  key: NEXT_PUBLIC_API_BASE_URL
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lop-frontend
  namespace: life-observability-platform
spec:
  selector:
    app: lop-frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
